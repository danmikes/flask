<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
  <title>Flask App | {% block title %}Index{% endblock %}</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  {% include 'unit/header.htm' %}
  <div class="container mt-4">
    {% include 'unit/message.htm' %}
    {% block body %}{% endblock %}
  </div>
  {% include 'unit/footer.htm' %}

  <script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="{{ url_for('base.static', filename='favicon.ico') }}">
  <title>Flask App | {% block title %}Index{% endblock %}</title>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bulma@0.9.3/css/bulma.min.css">
  <link rel="stylesheet" type="text/css" href="{{ url_for('base.static', filename='base.css') }}">
  {% block head %}{% endblock %}
  {% block css %}{% endblock %}
</head>
<body>
  {% include 'unit/header.htm' %}

  <div class="container is-max-desktop">
    <div class="content has-text-centered">
      {% include 'unit/message.htm' %}
      {% block body %}{% endblock %}
    </div>
  </div>

  {% include 'unit/footer.htm' %}

  <script>const currentUserId = "{{ current_user.id }}";</script>
  <script src="{{ url_for('base.static', filename='base.js') }}"></script>
  {% block js %}{% endblock %}
</body>
</html>

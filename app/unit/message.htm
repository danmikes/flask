{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="notifications-container">
      <div class="notifications">
        {% for category, message in messages %}
          <div class="notification is-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    </div>
  {% endif %}
{% endwith %}

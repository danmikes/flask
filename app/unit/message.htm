{% with messages = get_flashed_messages(with_categories=true) %}
<div class="columns">
  {% if messages %}
  <div class="column is-one-third-tablet">
    <div class="notifications">
      {% for category, message in messages %}
        <div class="notification is-{{ category }}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  </div>
  {% endif %}
</div>
{% endwith %}

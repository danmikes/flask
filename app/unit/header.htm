<header>
  <nav class="navbar" role="navigation" aria-label="main navigation">
    <div class="navbar-brand">
      <a class="navbar-item" href="{{ url_for('base.index') }}">{{ current_user.username }}</a>
    </div>

    <div role="button" class="navbar-burger" aria-label="menu" aria-expanded="false" data-target="navbarBasicExample">
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
      <span aria-hidden="true"></span>
    </div>

    <div id="navbarBasicExample" class="navbar-menu">
      <div class="navbar-start">
      </div>
      <div class="navbar-mid">
        <a class="navbar-item" href="{{ url_for('base.index') }}">Home</a>
        {% if current_user.is_authenticated %}
          <a class="navbar-item" href="{{ url_for('wish.wishes') }}">WishList</a>
        {% endif %}
      </div>

      <div class="navbar-end">
        {% if current_user.is_authenticated %}
          <a class="navbar-item" href="{{ url_for('user.logout') }}">Log Out</a>
        {% else %}
          <a class="navbar-item" href="{{ url_for('user.register' if page == 'login' else 'user.user_login') }}">
            {{ 'Register' if page == 'login' else 'Log In' }}
          </a>
        {% endif %}
      </div>
    </div>
  </nav>
</header>

<header class="header">
  <div class="header-container">
    {% include 'unit/message.htm' %}
    <nav class="navbar" role="navigation" aria-label="main navigation">
      <div class="navbar-burger" role="button" aria-label="menu" aria-expanded="false" data-target="navbarMenu">
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
        <span aria-hidden="true"></span>
      </div>
      <div id="navbarMenu" class="navbar-menu">
        {% if current_user.is_authenticated %}
          <a class="navbar-item button is-warning" href="{{ url_for('user.user_logout') }}">
            Log-Out
          </a>
        {% else %}
          <a class="navbar-item button {{ 'is-warning' if page == 'login' else 'is-info' }}" href="{{ url_for('user.user_register' if page == 'login' else 'user.user_login') }}">
            {{ 'Register' if page == 'login' else 'Log-In' }}
          </a>
        {% endif %}
      </div>
    </nav>
  </div>
</header>
